services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mattin-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-mattin_ai}
      POSTGRES_USER: ${DATABASE_USER:-mattin}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mattin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mattin-qdrant
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__LOG_LEVEL: INFO
    networks:
      - mattin-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  backend:
    image: ghcr.io/lksnext-ai-lab/mattinai-backend:${IMAGE_TAG:-develop}
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: mattin-backend
    environment:
      SQLALCHEMY_DATABASE_URI: postgresql://${DATABASE_USER:-mattin}:${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}@postgres:5432/${DATABASE_NAME:-mattin_ai}
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: ${DATABASE_USER:-mattin}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}
      DATABASE_NAME: ${DATABASE_NAME:-mattin_ai}

      AICT_LOGIN: ${AICT_LOGIN:-FAKE}
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY must be set in .env}"
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}

      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-}

      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}

      AICT_MODE: ${AICT_MODE:-SELF-HOSTED}
      AICT_OMNIADMINS: ${AICT_OMNIADMINS:-admin@example.com}
      REPO_BASE_FOLDER: ${REPO_BASE_FOLDER:-./data/repositories}

      VECTOR_DB_TYPE: ${VECTOR_DB_TYPE:-PGVECTOR}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_PREFER_GRPC: ${QDRANT_PREFER_GRPC:-false}

      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-}
    volumes:
      - ../backend/data:/aict_backend/data
      - ../backend/logs:/aict_backend/logs
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - mattin-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/lksnext-ai-lab/mattinai-frontend:${IMAGE_TAG:-develop}
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: mattin-frontend
    environment:
      VITE_API_BASE_URL: ""
      VITE_OIDC_ENABLED: ${VITE_OIDC_ENABLED:-false}
      VITE_OIDC_AUTHORITY: ${VITE_OIDC_AUTHORITY:-}
      VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID:-}
      VITE_OIDC_REDIRECT_URI: ${VITE_OIDC_REDIRECT_URI:-}
      VITE_OIDC_SCOPE: ${VITE_OIDC_SCOPE:-openid profile email}
      VITE_OIDC_AUDIENCE: ${VITE_OIDC_AUDIENCE:-}
    depends_on:
      - backend
    networks:
      - mattin-network
    restart: unless-stopped

  db_test:
    image: pgvector/pgvector:pg17
    container_name: mattin-postgres-test
    environment:
      POSTGRES_DB: ${TEST_DB_NAME:-test_db}
      POSTGRES_USER: ${TEST_DB_USER:-test_user}
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-test_pass}  # pragma: allowlist secret
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - mattin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles:
      - test

  caddy:
    image: caddy:2-alpine
    container_name: mattin-caddy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - mattin-network
    restart: unless-stopped

networks:
  mattin-network:
    driver: bridge

volumes:
  postgres-data:
  qdrant-data:
  caddy-data:
  caddy-config:
