services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__LOG_LEVEL: INFO
    restart: unless-stopped
    networks:
      - qdrant-network

  qdrant-web-ui:
    image: qdrant/qdrant:latest
    container_name: qdrant-web-ui
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
    ports:
      - "6335:6335"
    restart: unless-stopped
    networks:
      - qdrant-network

networks:
  qdrant-network:
    driver: bridge

volumes:
  qdrant_data:
